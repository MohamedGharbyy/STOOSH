<video 
  #bgVideo
  autoplay 
  muted 
  loop 
  playsinline 
  class="position-fixed top-50 start-50 translate-middle video-bg"
  style="object-fit: cover !important; min-width: 100vw !important; min-height: 100vh !important; max-width: 100vw !important; max-height: 100vh !important;">
  <source src="bg-waves.mp4" type="video/mp4">
</video>

<div class="container-fluid position-relative d-flex flex-column align-items-center justify-content-center min-vh-100 py-3 py-md-4 overflow-hidden" style="z-index: 10;">
  
  <div class="w-100 px-2" style="max-width: 500px;">
    
    @if (isLoggedIn) {
      <app-dashboard [title]="title()" [transactions]="transactions"></app-dashboard>
    } @else {
      <app-auth (loginSuccess)="onLoginSuccess()"></app-auth>
    }
  </div>
</div>
