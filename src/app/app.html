<div class="min-vh-100 d-flex flex-column" style="background-color: var(--stoosh-bg-primary);">
  
  @if (isLoading()) {
    <div class="d-flex flex-column align-items-center justify-content-center min-vh-100">
      
      <div class="d-flex flex-column align-items-center text-white mb-4">
        <i class="bi bi-wallet2 text-burnt-orange mb-2" style="font-size: 2.5rem;"></i>
        <h1 class="text-center text-white m-0 tracking-identity brand-identity" style="letter-spacing: 0.25rem; user-select: none;">STOO$H</h1>
        <p class="text-secondary small text-center mt-1">Personal Wealth Tracker</p>
      </div>
      
      <div class="spinner-border text-burnt-orange" role="status" style="width: 2rem; height: 2rem; border-width: 0.22em;">
        <span class="visually-hidden">Loading...</span>
      </div>
      
    </div>
  } @else {
    @if (isLoggedIn()) {
      <app-dashboard 
        [title]="title()" 
        [transactions]="transactions"
        (sidebarToggle)="onSidebarToggle()"
        (headerAction)="onHeaderAction($event)">
      </app-dashboard>
    } @else {
      <div class="login-page">
        <video class="login-video-bg" autoplay muted loop playsinline>
          <source src="bg-waves.mp4" type="video/mp4">
        </video>
        <div class="login-overlay"></div>
        <div class="login-content">
          <app-auth (loginSuccess)="onLoginSuccess()"></app-auth>
        </div>
      </div>
    }
  }
