<video 
  #bgVideo
  autoplay 
  muted 
  loop 
  playsinline 
  class="position-fixed top-50 start-50 translate-middle video-bg"
  style="object-fit: cover !important; min-width: 100vw !important; min-height: 100vh !important; max-width: 100vw !important; max-height: 100vh !important;">
  <source src="bg-waves.mp4" type="video/mp4">
</video>

<div class="container-fluid position-relative d-flex flex-column align-items-center justify-content-center min-vh-100 py-3 py-md-4 overflow-hidden" style="z-index: 10;">
  
  <div class="w-100 px-2" style="max-width: 500px;">
    
    @if (isLoading()) {
      <div class="card p-4 p-sm-5 rounded-4 shadow border-0 glass-card w-100 d-flex flex-column align-items-center justify-content-center" style="min-height: 400px;">
        
        <div class="d-flex flex-column align-items-center text-white mb-4">
          <i class="bi bi-wallet2 text-white mb-2 brand-identity-pulse" style="font-size: 2.5rem;"></i>
          <h1 class="text-center text-white m-0 tracking-identity" style="font-family: 'Optima'; letter-spacing: 0.2rem; user-select: none;">STOO$H</h1>
          <p class="text-white-50 small text-center mt-1">Personal Wealth Tracker</p>
        </div>

        <div class="spinner-border text-success" role="status" style="width: 2rem; height: 2rem; border-width: 0.22em;">
          <span class="visually-hidden">Loading...</span>
        </div>

      </div>
    } @else {
      @if (isLoggedIn()) {
        <app-dashboard [title]="title()" [transactions]="transactions"></app-dashboard>
      } @else {
        <app-auth (loginSuccess)="onLoginSuccess()"></app-auth>
      }
    }

  </div>
</div>
