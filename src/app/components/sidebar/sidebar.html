<nav class="stoosh-sidebar" [class.collapsed]="collapsed">
  <div class="stoosh-nav h-100 d-flex flex-column">
    
    <div class="stoosh-nav-header">
      <div class="d-flex align-items-center justify-content-center">
        <i class="bi bi-wallet2 stoosh-nav-brand-icon me-2"></i>
        <h1 class="stoosh-nav-brand mb-0">STOO$H</h1>
      </div>
    </div>
    
    <ul class="navbar-nav flex-column w-100">
      @for (item of navItems; track item.label) {
        <li class="nav-item">
          <a class="stoosh-nav-link" [class.active]="item.active" href="#" (click)="onNavItemClick(item); $event.preventDefault()">
            <i class="{{ item.icon }} stoosh-nav-icon"></i>
            <span class="nav-text">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
    
    <div class="mt-auto pt-3 border-top border-subtle">
      <button class="stoosh-btn stoosh-btn-ghost w-100" (click)="onToggleSidebar()">
        <i class="bi stoosh-nav-icon" [class.bi-chevron-left]="!collapsed" [class.bi-chevron-right]="collapsed"></i>
        <span class="nav-text">Collapse</span>
      </button>
    </div>
    
  </div>
</nav>
