<div class="stoosh-app-layout">
  
  <app-sidebar [collapsed]="sidebarCollapsed" (toggleSidebar)="onSidebarToggle()"></app-sidebar>
  
  <div class="stoosh-main-wrapper">
    
    <app-header [title]="title" [actions]="headerActions" (actionClick)="onHeaderAction($event)"></app-header>
    
    <main class="stoosh-main-content">
      <div class="container-fluid">
        
        <div class="row g-3 mb-4">
          <div class="col-12 col-sm-6 col-lg-3">
            <app-stat-card label="Total Balance" [value]="totalBalance" size="large"></app-stat-card>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <app-stat-card label="Income" [value]="income" variant="success"></app-stat-card>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <app-stat-card label="Expenses" [value]="expenses" variant="danger"></app-stat-card>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <app-stat-card label="Net Change" [value]="netChange" variant="success"></app-stat-card>
          </div>
        </div>
        
        <div class="stoosh-card p-3">
          <h3 class="text-white mb-3" style="font-size: 1.125rem; font-weight: 600;">Recent Transactions</h3>
          <app-transaction-list [items]="transactions"></app-transaction-list>
        </div>
        
      </div>
    </main>
    
  </div>
  
</div>
