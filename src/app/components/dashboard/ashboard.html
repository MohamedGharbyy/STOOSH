<!-- App Layout with Sidebar -->
<div class="stoosh-app-layout">
  
  <!-- Sidebar Navigation -->
  <nav class="stoosh-sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="stoosh-nav h-100 d-flex flex-column">
      
      <!-- Brand -->
      <div class="stoosh-nav-header">
        <h1 class="stoosh-nav-brand mb-0">STOO$H</h1>
      </div>
      
      <!-- Navigation Links -->
      <ul class="navbar-nav flex-column w-100">
        <li class="nav-item">
          <a class="stoosh-nav-link active" href="#">
            <i class="bi bi-house-door stoosh-nav-icon"></i>
            <span class="nav-text">Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="stoosh-nav-link" href="#">
            <i class="bi bi-arrow-up-arrow-down stoosh-nav-icon"></i>
            <span class="nav-text">Transactions</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="stoosh-nav-link" href="#">
            <i class="bi bi-bar-chart-line stoosh-nav-icon"></i>
            <span class="nav-text">Analytics</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="stoosh-nav-link" href="#">
            <i class="bi bi-gear stoosh-nav-icon"></i>
            <span class="nav-text">Settings</span>
          </a>
        </li>
      </ul>
      
      <!-- Collapse Toggle -->
      <div class="mt-auto pt-3 border-top border-subtle">
        <button class="stoosh-btn stoosh-btn-ghost w-100" (click)="toggleSidebar()">
          <i class="bi" [class.bi-chevron-left]="!sidebarCollapsed" [class.bi-chevron-right]="sidebarCollapsed"></i>
          <span class="nav-text">Collapse</span>
        </button>
      </div>
      
    </div>
  </nav>
  
  <!-- Main Content Area -->
  <div class="d-flex flex-column flex-grow-1">
    
    <!-- Top Header with Brand Alignment -->
    <header class="stoosh-header">
      <div class="d-flex align-items-center">
        <h1 class="stoosh-header-brand">STOO$H</h1>
        <h2 class="stoosh-header-title mb-0 ms-4">/ {{ title() }}</h2>
      </div>
      
      <div class="stoosh-header-actions">
        <button class="stoosh-btn stoosh-btn-secondary action-btn">
          <i class="bi bi-download"></i>
          Export
        </button>
        <button class="stoosh-btn stoosh-btn-primary action-btn">
          <i class="bi bi-plus-lg"></i>
          Add
        </button>
      </div>
    </header>
    
    <!-- Main Content -->
    <main class="flex-grow-1 overflow-y-auto p-4">
      <div class="container-fluid">
        
        <!-- Summary Cards -->
        <div class="row g-3 mb-4">
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stoosh-card p-3">
              <p class="text-secondary small mb-1">Total Balance</p>
              <p class="stoosh-figure stoosh-figure-large text-white mb-0">$24,580.00</p>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stoosh-card p-3">
              <p class="text-secondary small mb-1">Income</p>
              <p class="stoosh-figure stoosh-figure-medium text-success mb-0">+$5,000.00</p>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stoosh-card p-3">
              <p class="text-secondary small mb-1">Expenses</p>
              <p class="stoosh-figure stoosh-figure-medium text-danger mb-0">-$1,250.00</p>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stoosh-card p-3">
              <p class="text-secondary small mb-1">Net Change</p>
              <p class="stoosh-figure stoosh-figure-medium text-success mb-0">+$3,750.00</p>
            </div>
          </div>
        </div>
        
        <!-- Transaction List -->
        <div class="stoosh-card p-3">
          <h3 class="text-white mb-3" style="font-size: 1.125rem; font-weight: 600;">Recent Transactions</h3>
          <app-transaction-list [items]="transactions"></app-transaction-list>
        </div>
        
      </div>
    </main>
    
  </div>
  
</div>
